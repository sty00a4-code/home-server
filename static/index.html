<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>home-server</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="rack">
        <header class="topbar">
            <div class="brand">
                <span class="led" aria-hidden="true"></span>
                <span class="brand-name">home&#8209;server</span>
            </div>
            <div class="tagline">your apps, on your hardware</div>
        </header>

        <main class="cards">
            <a class="card" href="/files/">
                <div class="card-icon" aria-hidden="true">&#9638;</div>
                <div class="card-body">
                    <h2>Files</h2>
                    <p>Browse, upload, move, and download files stored on this server.</p>
                    <div class="card-stat" id="files-stat">…</div>
                </div>
            </a>

            <a class="card" href="/api/studies/summary">
                <div class="card-icon" aria-hidden="true">&#9636;</div>
                <div class="card-body">
                    <h2>Studies</h2>
                    <p>Modules, Klausur results, and Leistungspunkte — Leistungsübersicht.</p>
                    <div class="card-stat" id="studies-stat">…</div>
                    <div class="card-note">no dedicated page yet — links to the raw API</div>
                </div>
            </a>
        </main>

        <footer class="statusbar">
            <span id="status-text">ready</span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>

</html>
